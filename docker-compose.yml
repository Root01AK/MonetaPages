version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: moneta_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moneta_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: moneta_backend
    ports:
      - "8008:8008"
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always
    depends_on:
      - db
    environment:
      - PORT=8008
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@db:5432/moneta_local}
      - SECRET_KEY=${SECRET_KEY:-moneta-bank-super-secret-key-123}
      - ALGORITHM=${ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-true}

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
    container_name: moneta_frontend
    ports:
      - "3000:80"
    restart: always
    depends_on:
      - backend

volumes:
  pgdata:
